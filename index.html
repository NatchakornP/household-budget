<!DOCTYPE html>
<html>
<head>
  <title>Household Budget</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Household Budget</h1>

<h2>Login / Signup</h2>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
<p id="msg"></p>

<h2>Add Expense</h2>
<input id="title" placeholder="title">
<input id="amount" type="number" placeholder="amount">
<button onclick="addExpense()">Add</button>

<h2>Expenses</h2>
<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Amount</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script>
const SUPABASE_URL = "https://dbqprjqpjnxxsdsnazag.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRicXByanFwam54eHNkc25hemFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTM4MDksImV4cCI6MjA5MjA4OTgwOX0.i2vB5P0_6DMkqVmD7MjuTpFbXa6Fxjg6xEbZSiG-WYY";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function signup(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({ email, password });
  document.getElementById("msg").innerText = error ? error.message : "Signed up!";
}

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  document.getElementById("msg").innerText = error ? error.message : "Logged in!";
  loadExpenses();
}

async function addExpense(){
  const title = document.getElementById("title").value;
  const amount = document.getElementById("amount").value;

  const { data: { user } } = await supabaseClient.auth.getUser();

  const { error } = await supabaseClient.from("expenses").insert({
    title,
    amount,
    user_id: user?.id
  });

  if(error){ alert(error.message); return; }

  loadExpenses();
}

async function loadExpenses(){
  const { data } = await supabaseClient.from("expenses").select("*").order("id",{ascending:false});

  const list = document.getElementById("list");
  list.innerHTML = data.map(row => `
    <tr>
      <td>${row.title}</td>
      <td>${row.amount}</td>
      <td>
        <button onclick="editExpense('${row.id}','${row.title}',${row.amount})">Edit</button>
        <button onclick="deleteExpense('${row.id}')">Delete</button>
      </td>
    </tr>
  `).join("");
}

async function deleteExpense(id){
  await supabaseClient.from("expenses").delete().eq("id", id);
  loadExpenses();
}

async function editExpense(id, title, amount){
  const newTitle = prompt("Edit title", title);
  const newAmount = prompt("Edit amount", amount);

  await supabaseClient.from("expenses").update({
    title: newTitle,
    amount: newAmount
  }).eq("id", id);

  loadExpenses();
}
</script>

</body>
</html>
