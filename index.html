<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Household Budget</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrap">

    <!-- HEADER -->
    <div class="row">
      <div>
        <h1>Household Budget</h1>
        <p class="muted">Track expenses, income, and savings</p>
      </div>
      <button id="logoutBtn" class="secondary hidden">Log out</button>
    </div>

    <!-- AUTH -->
    <section id="authSection" class="card">
      <h2>Login / Signup</h2>
      <div class="auth-row">
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
        <button id="loginBtn">Login</button>
        <button id="signupBtn" class="secondary">Signup</button>
      </div>
      <p id="authMessage" class="muted"></p>
    </section>

    <!-- APP -->
    <section id="appSection" class="hidden">

      <!-- STATS -->
      <div class="stats">
        <div class="card">
          <p class="muted">Balance</p>
          <h2 id="trackedBalance">0</h2>
        </div>

        <div class="card">
          <p class="muted">Income</p>
          <h2 id="totalIncome">0</h2>
        </div>

        <div class="card">
          <p class="muted">Expenses</p>
          <h2 id="totalExpenses">0</h2>
        </div>

        <div class="card">
          <p class="muted">Saved</p>
          <h2 id="totalSaved">0</h2>
        </div>
      </div>

      <!-- EXPENSE SECTION -->
      <section class="feature-section">

        <!-- ADD -->
        <div class="card">
          <h3>Add Expense</h3>
          <form id="expenseForm">
            <input name="title" placeholder="Title" required />
            <input name="amount" type="number" placeholder="Amount" required />
            <input name="date" type="date" required />
            <input name="paid_by" placeholder="Paid by" />
            <button type="submit">Save</button>
          </form>
        </div>

        <!-- LIST -->
        <div class="card">
          <h3>Recent Expenses</h3>
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="expensesBody"></tbody>
          </table>
        </div>

      </section>

      <!-- INCOME SECTION -->
      <section class="feature-section">

        <div class="card">
          <h3>Add Income</h3>
          <form id="incomeForm">
            <input name="amount" type="number" placeholder="Amount" required />
            <input name="date" type="date" required />
            <button type="submit">Save</button>
          </form>
        </div>

        <div class="card">
          <h3>Recent Income</h3>
          <table>
            <tbody id="incomeBody"></tbody>
          </table>
        </div>

      </section>

      <!-- SAVINGS SECTION -->
      <section class="feature-section">

        <div class="card">
          <h3>Add Savings</h3>
          <form id="savingsForm">
            <select id="goalSelect" name="goal_id"></select>
            <input name="amount" type="number" placeholder="Amount" required />
            <button type="submit">Save</button>
          </form>
        </div>

        <div class="card">
          <h3>Recent Savings</h3>
          <table>
            <tbody id="savingsBody"></tbody>
          </table>
        </div>

      </section>

      <!-- GOALS -->
      <section class="card">
        <h3>Savings Goals</h3>
        <table>
          <tbody id="goalsBody"></tbody>
        </table>
      </section>

    </section>

  </div>

  <!-- JS -->
  <script src="app.js"></script>
</body>
</html>
